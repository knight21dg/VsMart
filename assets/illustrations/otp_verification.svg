<svg width="320" height="280" viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- soft background blobs -->
  <circle cx="160" cy="140" r="118" fill="#16A34A" fill-opacity="0.06"/>
  <circle cx="160" cy="140" r="82" fill="#16A34A" fill-opacity="0.08"/>

  <!-- decorative dots -->
  <circle cx="46" cy="70" r="6" fill="#16A34A" fill-opacity="0.35"/>
  <circle cx="278" cy="96" r="8" fill="#2563EB" fill-opacity="0.30"/>
  <circle cx="60" cy="206" r="7" fill="#F59E0B" fill-opacity="0.35"/>
  <circle cx="268" cy="200" r="5" fill="#16A34A" fill-opacity="0.40"/>

  <!-- phone body -->
  <rect x="112" y="50" width="96" height="180" rx="20" fill="#FFFFFF" stroke="#16A34A" stroke-width="3"/>
  <rect x="112" y="50" width="96" height="180" rx="20" fill="#16A34A" fill-opacity="0.04"/>
  <!-- speaker notch -->
  <rect x="146" y="62" width="28" height="5" rx="2.5" fill="#16A34A" fill-opacity="0.4"/>

  <!-- screen content: OTP boxes -->
  <rect x="126" y="120" width="16" height="22" rx="4" fill="#16A34A" fill-opacity="0.15" stroke="#16A34A" stroke-width="2"/>
  <rect x="148" y="120" width="16" height="22" rx="4" fill="#16A34A" fill-opacity="0.15" stroke="#16A34A" stroke-width="2"/>
  <rect x="170" y="120" width="16" height="22" rx="4" fill="#16A34A" fill-opacity="0.15" stroke="#16A34A" stroke-width="2"/>
  <circle cx="134" cy="131" r="2.6" fill="#16A34A"/>
  <circle cx="156" cy="131" r="2.6" fill="#16A34A"/>
  <circle cx="178" cy="131" r="2.6" fill="#16A34A"/>

  <!-- small lines under boxes -->
  <rect x="126" y="156" width="68" height="6" rx="3" fill="#16A34A" fill-opacity="0.18"/>
  <rect x="126" y="170" width="44" height="6" rx="3" fill="#16A34A" fill-opacity="0.12"/>

  <!-- shield badge with check (security) -->
  <g>
    <path d="M214 150c0 26-18 38-30 42-12-4-30-16-30-42v-26l30-11 30 11v26z" fill="#16A34A"/>
    <path d="M170 150l9 9 18-19" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- message bubble (incoming SMS) top-left -->
  <g>
    <rect x="44" y="108" width="64" height="40" rx="12" fill="#2563EB"/>
    <path d="M58 148l-2 12 14-10" fill="#2563EB"/>
    <circle cx="62" cy="128" r="3.5" fill="#FFFFFF"/>
    <circle cx="76" cy="128" r="3.5" fill="#FFFFFF"/>
    <circle cx="90" cy="128" r="3.5" fill="#FFFFFF"/>
  </g>
</svg>
